<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entorno de Pruebas LLM</title>
</head>
<body>
    <h1>Prueba de Conexión LLM (Groq / Gemini)</h1>
    
    <div>
        <label for="provider">Proveedor:</label>
        <select id="provider">
            <option value="groq">Groq</option>
            <option value="gemini">Gemini</option>
        </select>
    </div>
    <br>
    
    <div>
        <label for="apiKey">API Key:</label><br>
        <input type="text" id="apiKey" placeholder="Ingresa tu clave aquí" size="50">
    </div>
    <br>

    <div>
        <label for="systemMsg">Instrucción del Sistema (Opcional):</label><br>
        <textarea id="systemMsg" rows="3" cols="50" placeholder="Ej: Eres un asistente útil..."></textarea>
    </div>
    <br>
    
    <div>
        <label for="temperature">Temperatura:</label>
        <input type="number" id="temperature" value="0.7" step="0.1" min="0" max="2">
        &nbsp;&nbsp;
        <label for="tokens">Max Tokens:</label>
        <input type="number" id="tokens" value="500" step="100" min="100" max="8000">
    </div>
    <br>

    <div>
        <label for="speechLang">Idioma de voz:</label>
        <select id="speechLang">
            <option value="es-CO" selected>Español (Colombia)</option>
            <option value="es-ES">Español (España)</option>
            <option value="es-MX">Español (México)</option>
            <option value="en-US">English (United States)</option>
            <option value="pt-BR">Português (Brasil)</option>
        </select>
    </div>
    <br>
    
    <div>
        <label for="userMsg">Mensaje del Usuario:</label><br>
        <textarea id="userMsg" rows="4" cols="50" placeholder="Escribe tu mensaje aquí..."></textarea>
    </div>
    <br>
    
    <button id="sendBtn">Enviar Mensaje</button>
    &nbsp;
    <button id="startBtn">Iniciar Escucha</button>
    <button id="stopBtn" disabled>Detener Escucha</button>
    <span id="listeningIndicator" style="font-weight:600; color:green; display:none; margin-left:8px;">Escuchando...</span>
    &nbsp;
    <label for="voiceToggle">Responder por voz:</label>
    <input type="checkbox" id="voiceToggle" checked>
    <br><br>
    
    <div>
        <label>Respuesta del LLM:</label><br>
        <textarea id="responseArea" rows="10" cols="80" readonly placeholder="La respuesta aparecerá aquí..."></textarea>
    </div>

    <script src="testingMessage.js"></script>
</body>
</html>
